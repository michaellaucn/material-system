<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亚帮公司 · 物料流转管理系统</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js">
    </script>
    <style>
        :root {
            --primary: #4F6EF7;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg: #F0F2F7;
            --card: #FFFFFF;
            --text: #1F2937;
            --text2: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 14px;
            --radius-sm: 10px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
        }
        .top-nav { position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 1px solid var(--border); padding: 0 14px; height: 50px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .top-nav .logo { font-size: 15px; font-weight: 700; color: var(--primary); white-space: nowrap; }
        .tab-nav { position: sticky; top: 50px; z-index: 99; background: #fff; border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 6px; }
        .tab-nav::-webkit-scrollbar { display: none; }
        .tab-nav .tab-btn { flex-shrink:0; padding: 10px 13px; border:none; background:transparent; font-size:12px; font-weight:500; color:var(--text2); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; transition:0.2s; }
        .tab-nav .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:600; }
        .main-content { max-width: 960px; margin: 0 auto; padding: 14px; padding-bottom: 50px; }
        .page { display: none; animation: fadeIn 0.2s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        .card { background:var(--card); border-radius:var(--radius); padding:18px; margin-bottom:14px; box-shadow:var(--shadow); border:1px solid var(--border); }
        .card h2 { font-size:16px; font-weight:700; margin-bottom:6px; }
        .card h3 { font-size:14px; font-weight:600; margin:10px 0 6px; color:#374151; }
        .subtitle { font-size:11px; color:var(--text2); margin-bottom:10px; }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(120px,1fr)); gap:8px; margin-bottom:14px; }
        .stat-card { background:#fff; border-radius:var(--radius-sm); padding:14px; text-align:center; box-shadow:var(--shadow); border:1px solid var(--border); }
        .stat-card .stat-value { font-size:22px; font-weight:700; color:var(--primary); }
        .stat-card .stat-label { font-size:10px; color:var(--text2); margin-top:2px; }
        .form-group { margin-bottom:10px; }
        .form-group label { display:block; font-size:12px; font-weight:600; margin-bottom:3px; }
        .form-group input, .form-group select, .form-group textarea { width:100%; padding:9px 12px; border:2px solid var(--border); border-radius:8px; font-size:13px; background:#FAFBFC; transition:0.2s; }
        .form-group input:focus, .form-group select:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(79,110,247,0.07); }
        .form-row { display:flex; gap:8px; flex-wrap:wrap; }
        .form-row .form-group { flex:1; min-width:100px; }
        .btn { display:inline-flex; align-items:center; gap:5px; padding:9px 16px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:0.2s; white-space:nowrap; font-family:inherit; min-height:38px; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-success { background:var(--success); color:#fff; }
        .btn-warning { background:var(--warning); color:#fff; }
        .btn-danger { background:var(--danger); color:#fff; }
        .btn-outline { background:#fff; color:var(--primary); border:2px solid var(--primary); }
        .btn-sm { padding:5px 10px; font-size:11px; min-height:30px; border-radius:6px; }
        .btn-block { width:100%; }
        .btn:disabled { opacity:0.5; cursor:not-allowed; }
        .table-wrap { overflow-x:auto; margin:6px 0; border-radius:8px; border:1px solid var(--border); }
        table { width:100%; border-collapse:collapse; font-size:11px; min-width:500px; }
        table th { background:#F9FAFB; padding:8px; text-align:left; font-weight:600; border-bottom:2px solid #E5E7EB; font-size:10px; }
        table td { padding:7px 8px; border-bottom:1px solid #F3F4F6; }
        .tag { display:inline-block; padding:3px 7px; border-radius:10px; font-size:9px; font-weight:600; }
        .tag-green { background:#ECFDF5; color:#059669; }
        .tag-yellow { background:#FFFBEB; color:#B45309; }
        .tag-blue { background:#EEF1FF; color:#4F6EF7; }
        .tag-red { background:#FEF2F2; color:#DC2626; }
        .empty-state { text-align:center; padding:28px 14px; color:var(--text2); font-size:13px; }
        .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:9999; background:#1F2937; color:#fff; padding:9px 18px; border-radius:20px; font-size:12px; animation:toastIn 0.3s ease, toastOut 0.3s ease 2s forwards; }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-8px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        @keyframes toastOut { from{opacity:1;} to{opacity:0;} }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; justify-content:center; align-items:center; padding:14px; }
        .modal-overlay.show { display:flex; }
        .modal { background:#fff; border-radius:var(--radius); padding:20px; width:100%; max-width:460px; max-height:85vh; overflow-y:auto; }
        .storage-warning { background:#FEF3C7; color:#92400E; text-align:center; padding:6px; font-size:11px; display:none; }
        @media (max-width: 640px) {
            .top-nav { height:44px; } .tab-nav { top:44px; } .tab-nav .tab-btn { padding:8px 9px; font-size:10px; }
            .main-content { padding:8px; } .card { padding:12px; } .stats-grid { grid-template-columns:repeat(2,1fr); }
        }
    </style>
</head>
<body>
    <div id="toastContainer"></div>
    <div class="storage-warning" id="storageWarning">⚠️ 浏览器存储不可用，刷新后数据会丢失。请在「设置」页面导出数据备份，下次导入恢复。</div>

    <!-- 登录页面 -->
    <div id="loginPage" style="display:block;">
        <div style="max-width:400px;margin:40px auto;padding:14px;">
            <div class="card" style="text-align:center;">
                <div style="font-size:48px;">📦</div>
                <h1>物料流转管理系统</h1>
                <p style="color:#6B7280;font-size:12px;">亚帮公司 & 玻璃垫厂</p>
                <div id="loginForm">
                    <div class="form-group"><label>用户名</label><input type="text" id="loginUsername" placeholder="请输入用户名"></div>
                    <div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码"></div>
                    <button class="btn btn-primary btn-block" onclick="doLogin()">🔐 登录</button>
                    <p style="margin-top:10px;font-size:11px;">还没有账号？<a href="javascript:showRegister()" style="color:#4F6EF7;">立即注册</a></p>
                    <p style="font-size:10px;color:#9CA3AF;">演示账号：yabang / 123456 或 factory / 123456</p>
                </div>
                <div id="registerForm" style="display:none;">
                    <div class="form-group"><label>用户名</label><input type="text" id="regUsername"></div>
                    <div class="form-group"><label>密码</label><input type="password" id="regPassword"></div>
                    <div class="form-group"><label>确认密码</label><input type="password" id="regPassword2"></div>
                    <div class="form-group"><label>所属公司</label><select id="regRole"><option value="yabang">亚帮公司</option><option value="factory">玻璃垫厂</option></select></div>
                    <div class="form-group"><label>显示名称</label><input type="text" id="regDisplayName"></div>
                    <button class="btn btn-success btn-block" onclick="doRegister()">✅ 注册</button>
                    <p style="margin-top:10px;font-size:11px;">已有账号？<a href="javascript:showLogin()" style="color:#4F6EF7;">返回登录</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="mainApp" style="display:none;">
        <div class="top-nav">
            <div class="logo">📦 <span id="headerTitle">物料流转管理</span></div>
            <div style="display:flex; align-items:center; gap:8px;">
                <span id="headerUser">👤 --</span>
                <span style="font-weight:600;color:var(--primary);" id="headerRole">--</span>
                <button class="btn-sm" style="background:#FEF2F2;color:#DC2626;border:none;" onclick="doLogout()">退出</button>
            </div>
        </div>
        <div class="tab-nav" id="tabNav"></div>
        <div class="main-content" id="mainContent"></div>
    </div>

    <!-- 确认收货模态框 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h3 id="confirmModalTitle">确认操作</h3>
            <p id="confirmModalMsg" style="font-size:12px;"></p>
            <div class="form-group"><label>确认人</label><input type="text" id="confirmOperator"></div>
            <div style="display:flex; gap:6px; justify-content:flex-end; margin-top:14px;">
                <button class="btn btn-outline btn-sm" onclick="closeModal()">取消</button>
                <button class="btn btn-primary btn-sm" id="confirmModalBtn">确认</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // 存储容错
            let memoryDB = null, storageAvailable = true;
            const STORAGE_KEY = 'mfs_data_v2';
            function testStorage() { try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); return true; } catch(e) { return false; } }
            if(!testStorage()) { storageAvailable = false; document.getElementById('storageWarning').style.display='block'; }
            function getDB() { if(!storageAvailable) return memoryDB; try { const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):null; } catch(e) { storageAvailable=false; document.getElementById('storageWarning').style.display='block'; return memoryDB; } }
            function saveDB(db) { memoryDB=db; if(!storageAvailable) { document.getElementById('storageWarning').style.display='block'; return; } try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e) { storageAvailable=false; document.getElementById('storageWarning').style.display='block'; } }

            function initDB() {
                let db = getDB();
                if(!db) {
                    db = {
                        systemConfig: { companyName: '亚帮公司', factoryName: '玻璃垫厂' },
                        warehouses: [
                            { id:'wh_company', name:'亚帮公司仓库', type:'company' },
                            { id:'wh_factory', name:'玻璃垫厂仓库', type:'factory' }
                        ],
                        materials: [
                            { id:'mat_1', name:'袖套', sku:'XT-001', unit:'个' },
                            { id:'mat_2', name:'底胶', sku:'DJ-001', unit:'kg' },
                            { id:'mat_3', name:'防滑垫', sku:'FH-001', unit:'片' },
                            { id:'mat_4', name:'包装盒', sku:'BZ-001', unit:'个' }
                        ],
                        products: [
                            { id:'prod_1', name:'玻璃鼠标垫-标准款', sku:'GMP-001', unit:'个' },
                            { id:'prod_2', name:'玻璃鼠标垫-加大款', sku:'GMP-002', unit:'个' }
                        ],
                        boms: [
                            { id:'bom_1', productId:'prod_1', materialId:'mat_1', quantity:1, productName:'玻璃鼠标垫-标准款', materialName:'袖套' },
                            { id:'bom_2', productId:'prod_1', materialId:'mat_2', quantity:0.5, productName:'玻璃鼠标垫-标准款', materialName:'底胶' },
                            { id:'bom_3', productId:'prod_1', materialId:'mat_3', quantity:1, productName:'玻璃鼠标垫-标准款', materialName:'防滑垫' },
                            { id:'bom_4', productId:'prod_1', materialId:'mat_4', quantity:1, productName:'玻璃鼠标垫-标准款', materialName:'包装盒' },
                            { id:'bom_5', productId:'prod_2', materialId:'mat_1', quantity:1, productName:'玻璃鼠标垫-加大款', materialName:'袖套' },
                            { id:'bom_6', productId:'prod_2', materialId:'mat_2', quantity:0.8, productName:'玻璃鼠标垫-加大款', materialName:'底胶' },
                            { id:'bom_7', productId:'prod_2', materialId:'mat_3', quantity:1.5, productName:'玻璃鼠标垫-加大款', materialName:'防滑垫' },
                            { id:'bom_8', productId:'prod_2', materialId:'mat_4', quantity:1, productName:'玻璃鼠标垫-加大款', materialName:'包装盒' }
                        ],
                        orders: [],
                        purchaseOrders: [],
                        productionOrders: [],
                        materialRecords: [],
                        productRecords: [],
                        users: [
                            { id:'user_1', username:'yabang', password:'123456', role:'yabang', displayName:'亚帮-张经理', createdAt:new Date().toISOString() },
                            { id:'user_2', username:'factory', password:'123456', role:'factory', displayName:'玻璃垫厂-李主管', createdAt:new Date().toISOString() }
                        ],
                        idCounter: 500
                    };
                    saveDB(db);
                }
                syncWarehouseNames(db);
                return db;
            }
            function syncWarehouseNames(db) {
                const cw = db.warehouses.find(w=>w.type==='company');
                const fw = db.warehouses.find(w=>w.type==='factory');
                if(cw) cw.name = db.systemConfig.companyName+'仓库';
                if(fw) fw.name = db.systemConfig.factoryName+'仓库';
            }
            function getDBRef() { let db=getDB(); if(!db) db=initDB(); return db; }
            function saveAndRefresh() { const db=getDBRef(); syncWarehouseNames(db); saveDB(db); refreshCurrentPage(); updateHeaderUI(); }

            function getInventory(db) {
                const inv = {};
                for(const r of db.materialRecords) {
                    const k = 'material|'+r.materialId+'|';
                    if(r.recordType==='purchase_inbound' && r.status==='confirmed') inv[k+r.toWarehouseId] = (inv[k+r.toWarehouseId]||0)+r.quantity;
                    else if(r.recordType==='transfer_out' && r.status==='confirmed') inv[k+r.fromWarehouseId] = (inv[k+r.fromWarehouseId]||0)-r.quantity;
                    else if(r.recordType==='transfer_in' && r.status==='confirmed') inv[k+r.toWarehouseId] = (inv[k+r.toWarehouseId]||0)+r.quantity;
                }
                for(const r of db.productRecords) {
                    const k = 'product|'+r.productId+'|';
                    if((r.recordType==='production_inbound'||r.recordType==='transfer_in') && r.status==='confirmed') inv[k+r.toWarehouseId] = (inv[k+r.toWarehouseId]||0)+r.quantity;
                    else if((r.recordType==='transfer_out'||r.recordType==='sales_outbound') && r.status==='confirmed') inv[k+r.fromWarehouseId] = (inv[k+r.fromWarehouseId]||0)-r.quantity;
                }
                return inv;
            }
            function getItemInventory(db, type, itemId, warehouseId) {
                const inv = getInventory(db);
                return inv[type+'|'+itemId+'|'+warehouseId] || 0;
            }

            function showToast(msg) {
                const c = document.getElementById('toastContainer');
                const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
                c.appendChild(t); setTimeout(()=>t.remove(),2500);
            }
            function formatDate(iso) { if(!iso) return '-'; const d=new Date(iso), p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }
            function getRecordTypeLabel(t) { const m={purchase_inbound:'采购入库',transfer_out:'调拨出库',transfer_in:'调拨入库',production_inbound:'生产入库',sales_outbound:'销售出库'}; return m[t]||t; }

            let currentUser=null, currentRole=null, currentDisplayName='';
            function checkAutoLogin() {
                const saved = sessionStorage.getItem('mfs_current_user');
                if(saved) {
                    try {
                        const user=JSON.parse(saved);
                        const db=getDBRef();
                        const found=db.users.find(u=>u.id===user.id);
                        if(found) { currentUser=found; currentRole=found.role; currentDisplayName=found.displayName||found.username; document.getElementById('loginPage').style.display='none'; document.getElementById('mainApp').style.display='block'; updateHeaderUI(); buildTabNav(); switchPage('dashboard'); return; }
                    }catch(e){}
                }
                document.getElementById('loginPage').style.display='block';
                document.getElementById('mainApp').style.display='none';
            }
            function updateHeaderUI() {
                if(!currentUser) return;
                document.getElementById('headerUser').textContent='👤 '+currentDisplayName;
                const db=getDBRef();
                document.getElementById('headerRole').textContent = currentRole==='yabang'? db.systemConfig.companyName : db.systemConfig.factoryName;
                document.getElementById('headerTitle').textContent = (currentRole==='yabang'?db.systemConfig.companyName:db.systemConfig.factoryName)+' · 物料管理';
            }

            window.showRegister=()=>{ document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='block'; };
            window.showLogin=()=>{ document.getElementById('registerForm').style.display='none'; document.getElementById('loginForm').style.display='block'; };
            window.doLogin=function(){
                const u=document.getElementById('loginUsername').value.trim(), p=document.getElementById('loginPassword').value.trim();
                if(!u||!p){showToast('⚠️ 请输入用户名和密码'); return;}
                const db=getDBRef(); const user=db.users.find(x=>x.username===u&&x.password===p);
                if(!user){showToast('⚠️ 用户名或密码错误'); return;}
                currentUser=user; currentRole=user.role; currentDisplayName=user.displayName||user.username;
                sessionStorage.setItem('mfs_current_user',JSON.stringify(user));
                document.getElementById('loginPage').style.display='none'; document.getElementById('mainApp').style.display='block';
                updateHeaderUI(); buildTabNav(); switchPage('dashboard');
            };
            window.doRegister=function(){
                const u=document.getElementById('regUsername').value.trim(), p=document.getElementById('regPassword').value.trim(), p2=document.getElementById('regPassword2').value.trim();
                const role=document.getElementById('regRole').value, name=document.getElementById('regDisplayName').value.trim();
                if(!u||!p||!name){showToast('⚠️ 请填写所有字段'); return;}
                if(p!==p2){showToast('⚠️ 两次密码不一致'); return;}
                if(p.length<4){showToast('⚠️ 密码至少4位'); return;}
                const db=getDBRef(); if(db.users.find(x=>x.username===u)){showToast('⚠️ 用户名已存在'); return;}
                db.users.push({id:'user_'+(db.idCounter++),username:u,password:p,role,displayName:name,createdAt:new Date().toISOString()});
                saveDB(db); showToast('✅ 注册成功，请登录'); showLogin();
                ['regUsername','regPassword','regPassword2','regDisplayName'].forEach(id=>document.getElementById(id).value='');
            };
            window.doLogout=function(){
                currentUser=null; currentRole=null; sessionStorage.removeItem('mfs_current_user');
                document.getElementById('mainApp').style.display='none'; document.getElementById('loginPage').style.display='block';
                document.getElementById('tabNav').innerHTML=''; document.getElementById('mainContent').innerHTML='';
            };

            function buildTabNav() {
                const tabs = [
                    {id:'dashboard',label:'📊 仪表盘',roles:['yabang','factory']},
                    {id:'materialInbound',label:'📥 物料入库',roles:['yabang','factory']},
                    {id:'materialTransfer',label:'🚚 物料调拨',roles:['yabang','factory']},
                    {id:'productInbound',label:'🏗️ 成品入库',roles:['factory']},
                    {id:'productTransfer',label:'📬 成品发货',roles:['yabang','factory']},
                    {id:'inventory',label:'📋 库存查询',roles:['yabang','factory']},
                    {id:'records',label:'📝 流转记录',roles:['yabang','factory']},
                    {id:'orders',label:'📋 销售订单',roles:['yabang']},
                    {id:'mrp',label:'📊 MRP汇总',roles:['yabang']},
                    {id:'purchase',label:'📋 采购订单',roles:['yabang']},
                    {id:'production',label:'🏭 生产工单',roles:['yabang','factory']},
                    {id:'salesOutbound',label:'🚚 销售出库',roles:['yabang']},
                    {id:'bom',label:'🔩 BOM清单',roles:['yabang','factory']},
                    {id:'settings',label:'⚙️ 设置',roles:['yabang','factory']}
                ];
                const filtered = tabs.filter(t=>t.roles.includes(currentRole));
                const nav = document.getElementById('tabNav');
                nav.innerHTML = filtered.map(t=>`<button class="tab-btn" data-page="${t.id}">${t.label}</button>`).join('');
                nav.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',function(){switchPage(this.dataset.page);}));
            }

            function switchPage(name) {
                const mc = document.getElementById('mainContent');
                mc.innerHTML = `<div class="page active" id="page-${name}"></div>`;
                document.querySelectorAll('#tabNav .tab-btn').forEach(b=>b.classList.remove('active'));
                const btn = document.querySelector(`#tabNav .tab-btn[data-page="${name}"]`);
                if(btn) btn.classList.add('active');
                renderPageContent(name, document.getElementById('page-'+name));
            }
            function refreshCurrentPage() {
                const active = document.querySelector('#mainContent .page.active');
                if(active) renderPageContent(active.id.replace('page-',''), active);
            }

            function renderPageContent(name, container) {
                switch(name) {
                    case 'dashboard': renderDashboard(container); break;
                    case 'materialInbound': renderMaterialInbound(container); break;
                    case 'materialTransfer': renderMaterialTransfer(container); break;
                    case 'productInbound': renderProductInbound(container); break;
                    case 'productTransfer': renderProductTransfer(container); break;
                    case 'inventory': renderInventoryPage(container); break;
                    case 'records': renderRecordsPage(container); break;
                    case 'orders': renderOrdersPage(container); break;
                    case 'mrp': renderMRPPage(container); break;
                    case 'purchase': renderPurchasePage(container); break;
                    case 'production': renderProductionPage(container); break;
                    case 'salesOutbound': renderSalesOutboundPage(container); break;
                    case 'bom': renderBOMPage(container); break;
                    case 'settings': renderSettingsPage(container); break;
                }
            }

            // ==================== 仪表盘（简化） ====================
            function renderDashboard(container) {
                const db=getDBRef(); const inv=getInventory(db);
                const cw=db.warehouses.find(w=>w.type==='company'), fw=db.warehouses.find(w=>w.type==='factory');
                // 统计有库存的SKU种数，而非数量加总（不同单位加总无意义）
                let mc=0,mf=0,pc=0,pf=0;
                for(const [k,q] of Object.entries(inv)) {
                    if(q<=0) continue;
                    const p=k.split('|');
                    if(p[0]==='material') { if(p[2]===cw?.id) mc++; if(p[2]===fw?.id) mf++; }
                    else { if(p[2]===cw?.id) pc++; if(p[2]===fw?.id) pf++; }
                }
                const role=currentRole;
                container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">${role==='yabang'?mc:mf}</div><div class="stat-label">${role==='yabang'?'公司':'工厂'}物料种类</div></div>
                    <div class="stat-card"><div class="stat-value">${role==='yabang'?pc:pf}</div><div class="stat-label">${role==='yabang'?'公司':'工厂'}成品种类</div></div>
                    <div class="stat-card"><div class="stat-value">${db.orders.filter(o=>o.status!=='completed').length}</div><div class="stat-label">待交付订单</div></div>
                    <div class="stat-card"><div class="stat-value">${db.productionOrders.filter(o=>o.status==='in_progress').length}</div><div class="stat-label">生产中工单</div></div>
                </div>
                <div class="card"><h3>📋 待办事项</h3>
                <div style="font-size:12px;line-height:2;">
                ${db.purchaseOrders.filter(o=>o.status==='pending').length>0?`<div>📦 有 <b>${db.purchaseOrders.filter(o=>o.status==='pending').length}</b> 张采购单待跟进</div>`:''}
                ${db.productionOrders.filter(o=>o.status==='planned').length>0?`<div>🏭 有 <b>${db.productionOrders.filter(o=>o.status==='planned').length}</b> 张工单待开始生产</div>`:''}
                ${db.orders.filter(o=>o.status==='ready').length>0?`<div>🚚 有 <b>${db.orders.filter(o=>o.status==='ready').length}</b> 张订单可发货（成品已就绪）</div>`:''}
                ${db.orders.filter(o=>o.status!=='completed').length===0&&db.productionOrders.filter(o=>o.status==='in_progress').length===0?'<div style="color:var(--text2);">✅ 暂无待办事项</div>':''}
                </div></div>`;
            }

            window.submitMatIn = function() {

                const mid=document.getElementById('matInMat')?.value, qty=parseInt(document.getElementById('matInQty')?.value);
                const wid=document.getElementById('matInWh')?.value, op=document.getElementById('matInOp')?.value.trim();
                const poId=document.getElementById('matInPO')?.value;
                if(!mid||!qty||!wid||!op){showToast('⚠️ 填写完整'); return;}
                // 物料与采购单不一致时仍允许提交，但已有UI警告
                const mat=db.materials.find(m=>m.id===mid);
                db.materialRecords.push({id:'mr_'+(db.idCounter++),recordType:'purchase_inbound',materialId:mid,materialName:mat?mat.name:mid,quantity:qty,toWarehouseId:wid,operatorName:op,operatorCompany:'yabang',status:'confirmed',purchaseOrderId:poId||null,note:'',createdAt:new Date().toISOString()});
                if(poId) {
                    const po = db.purchaseOrders.find(p=>p.id===poId);
                    if(po) { po.receivedQuantity = (po.receivedQuantity||0)+qty; if(po.receivedQuantity >= po.quantity) po.status='completed'; else if(po.receivedQuantity>0) po.status='partial'; }

            window.checkPOMismatch = function() {
                const matId=document.getElementById('matInMat')?.value;
                const poSel=document.getElementById('matInPO');
                const warn=document.getElementById('poMismatchWarn');
                if(!poSel||!warn) return;
                const selectedOpt=poSel.options[poSel.selectedIndex];
                const poMatId=selectedOpt?.dataset?.mat;
                if(poMatId && poMatId!==matId) warn.style.display='block';
                else warn.style.display='none';

            // ==================== 销售订单（含创建、查看追溯） ====================
            function renderOrdersPage(container) {
                const db=getDBRef();
                const statusMap={'pending':'待生产','in_production':'生产中','ready':'待发货','completed':'已完成'};
                const statusTag={'pending':'tag-yellow','in_production':'tag-blue','ready':'tag-green','completed':'tag-green'};
                container.innerHTML = `
                <div class="card"><h2>📋 销售订单</h2>
                <div class="form-row"><div class="form-group"><label>成品</label><select id="ordProd">${db.products.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div>

                <div class="table-wrap" style="margin-top:10px;">${db.orders.length?`<table><tr><th>订单号</th><th>成品</th><th>数量</th><th>已发货</th><th>状态</th><th>生产工单</th><th>操作</th></tr>${db.orders.slice().reverse().map(o=>`<tr><td>${o.orderNo}</td><td>${o.productName}</td><td>${o.orderQuantity}</td><td>${o.shippedQuantity||0}</td><td><span class="tag ${statusTag[o.status]||'tag-yellow'}">${statusMap[o.status]||o.status}</span></td><td>${o.productionOrderId?db.productionOrders.find(p=>p.id===o.productionOrderId)?.orderNo||'-':'-'}</td><td style="white-space:nowrap;">${o.status==='pending'?`<button class="btn btn-sm btn-warning" onclick="createProdOrder('${o.id}')">生成工单</button> `:''}${o.status!=='completed'?`<button class="btn btn-sm btn-success" onclick="shipOrder('${o.id}')">发货</button> `:''}<button class="btn btn-sm btn-outline" onclick="traceOrder('${o.id}')">追溯</button></td></tr>`).join('')}</table>`:'<div class="empty-state">暂无订单</div>'}</div></div>`;
            }
            window.createOrder = function() {
                const db=getDBRef();
                const pid=document.getElementById('ordProd')?.value, qty=parseInt(document.getElementById('ordQty')?.value);
                if(!pid||!qty){showToast('⚠️ 填写完整'); return;}
                const prod=db.products.find(p=>p.id===pid);
                db.orders.push({id:'ord_'+(db.idCounter++),orderNo:'ORD-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'-'+String(db.idCounter).padStart(3,'0'),productId:pid,productName:prod?prod.name:pid,orderQuantity:qty,shippedQuantity:0,status:'pending',productionOrderId:null,createdBy:currentDisplayName,createdAt:new Date().toISOString()});
                saveAndRefresh(); showToast('✅ 订单已创建'); switchPage('orders');
            };
            window.createProdOrder = function(orderId) {
                const db=getDBRef();
                const order = db.orders.find(o=>o.id===orderId);
                if(!order||order.productionOrderId) return;
                const prodOrder = {id:'prodOrd_'+(db.idCounter++),orderNo:'MO-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'-'+String(db.idCounter).padStart(3,'0'),orderId:order.id,productId:order.productId,productName:order.productName,quantity:order.orderQuantity,completedQuantity:0,status:'planned',createdAt:new Date().toISOString()};
                db.productionOrders.push(prodOrder);
                order.productionOrderId = prodOrder.id;
                order.status = 'in_production';
                saveAndRefresh(); showToast('✅ 生产工单已生成'); switchPage('orders');
            };
            window.traceOrder = function(orderId) {
                const db=getDBRef();
                const order = db.orders.find(o=>o.id===orderId);
                if(!order) return;
                // 移除旧的追溯卡片
                document.querySelectorAll('.trace-card').forEach(el=>el.remove());
                const statusMap = {'pending':'待生产','in_production':'生产中','ready':'待发货','completed':'已完成'};
                let html = `<div class="card trace-card" style="border:2px solid var(--primary)"><h3>📊 订单追溯：${order.orderNo}</h3><p style="font-size:12px;color:var(--text2);margin-bottom:8px;">成品：${order.productName}，计划数量：${order.orderQuantity}，状态：${statusMap[order.status]||order.status}</p><ul style="font-size:12px;line-height:2;padding-left:16px;">`;
                if(order.productionOrderId) {
                    const po = db.productionOrders.find(p=>p.id===order.productionOrderId);
                    const poStatusMap={'planned':'待开始','in_progress':'生产中','completed':'已完成'};
                    html += `<li>🏭 生产工单：${po?.orderNo} — 计划${po?.quantity}个，已完成${po?.completedQuantity||0}个（${poStatusMap[po?.status]||po?.status}）</li>`;
                    const inbounds = db.productRecords.filter(r=>r.recordType==='production_inbound' && r.productionOrderId===order.productionOrderId);
                    html += `<li>🏗️ 成品入库：${inbounds.length?inbounds.map(r=>`${r.quantity}个 @ ${formatDate(r.createdAt)}`).join('；'):'暂无'}</li>`;
                    const transfers = db.productRecords.filter(r=>r.recordType==='transfer_out' && r.relatedOrderId===orderId);
                    html += `<li>🚚 成品调拨（厂→公司）：${transfers.length?transfers.map(r=>`${r.quantity}个 @ ${formatDate(r.createdAt)}`).join('；'):'暂无'}</li>`;
                } else {
                    html += `<li>🏭 生产工单：未生成</li>`;
                }
                // 关联采购单：通过orderId匹配
                const poList = db.purchaseOrders.filter(po=>po.relatedOrderId===orderId);
                html += `<li>📋 关联采购单：${poList.length?poList.map(p=>`${p.poNumber}（${p.status==='completed'?'已完成':p.status==='partial'?'部分到货':'待到货'}）`).join('；'):'无'}</li>`;
                const shipments = db.productRecords.filter(r=>r.recordType==='sales_outbound' && r.orderId===orderId);
                html += `<li>🚚 销售出库：${shipments.length?shipments.map(r=>`${r.quantity}个 @ ${formatDate(r.createdAt)}`).join('；'):'暂无'}</li>`;
                html += `</ul><button class="btn btn-sm btn-outline" style="margin-top:8px;" onclick="this.closest('.trace-card').remove()">关闭</button></div>`;
                const container = document.getElementById('page-orders');
                container.insertAdjacentHTML('beforeend', html);
            };

            function renderSalesOutboundPage(container) {
                const db=getDBRef();
                // 包含 pending/in_production/ready 状态的订单，且还有未发货数量

                <button class="btn btn-primary btn-block" onclick="submitSalesOut()">🚚 确认出库</button>`}
                </div>

                <div class="table-wrap">${records.length?`<table><tr><th>时间</th><th>订单号</th><th>成品</th><th>数量</th><th>操作人</th></tr>${records.map(r=>{const o=db.orders.find(x=>x.id===r.orderId);return`<tr><td>${formatDate(r.createdAt)}</td><td>${o?.orderNo||'-'}</td><td>${r.productName}</td><td>${r.quantity}</td><td>${r.operatorName}</td></tr>`}).join('')}</table>`:'<div class="empty-state">暂无记录</div>'}</div></div>`;
            }
            window.submitSalesOut = function() {
                const db=getDBRef();
                const orderId=document.getElementById('salesOutOrder')?.value, qty=parseInt(document.getElementById('salesOutQty')?.value);
                const op=document.getElementById('salesOutOp')?.value.trim();
                if(!orderId||!qty||!op){showToast('⚠️ 填写完整'); return;}
                const order = db.orders.find(o=>o.id===orderId);
                if(!order) return;
                const remaining = order.orderQuantity - (order.shippedQuantity||0);
                if(qty > remaining){showToast('⚠️ 超出未发货数量'); return;}

            // ==================== MRP 需求汇总 ====================
            function renderMRPPage(container) {
                const db=getDBRef();
                const pendingOrders = db.orders.filter(o=>o.status!=='completed');
                const demandMap = {};
                for(const order of pendingOrders) {
                    const boms = db.boms.filter(b=>b.productId===order.productId);
                    // 净需求 = 订单数量 - 已发货 - 关联工单已生产数量
                    const prodOrder = order.productionOrderId ? db.productionOrders.find(p=>p.id===order.productionOrderId) : null;
                    const alreadyMade = prodOrder ? (prodOrder.completedQuantity||0) : 0;
                    const remain = Math.max(0, order.orderQuantity - (order.shippedQuantity||0) - alreadyMade);
                    if(remain===0) continue;
                    for(const bom of boms) {
                        if(!demandMap[bom.materialId]) {
                            const mat=db.materials.find(m=>m.id===bom.materialId);
                            demandMap[bom.materialId]={name:bom.materialName,unit:mat?.unit||'个',total:0,orders:[]};
                        }
                        const needed = bom.quantity * remain;
                        demandMap[bom.materialId].total += needed;
                        demandMap[bom.materialId].orders.push(`${order.orderNo}×${needed}`);
                    }
                }
                const inv = getInventory(db);
                const rows = Object.entries(demandMap).map(([matId,d])=>{
                    let stock=0;
                    for(const [k,v] of Object.entries(inv)) { if(k.startsWith('material|'+matId+'|')) stock+=v; }
                    const gap = Math.ceil(d.total - stock);
                    return{matId,name:d.name,unit:d.unit,demand:d.total,stock,gap,orders:d.orders};
                });
                container.innerHTML = `
                <div class="card"><h2>📊 MRP 物料需求汇总</h2>
                <p class="subtitle">基于未完成订单 BOM 展开，扣除已生产和已有库存后计算净缺口</p>
                ${pendingOrders.length===0?'<div class="empty-state">当前无未完成订单，无需求</div>':
                rows.length===0?'<div class="empty-state">✅ 当前库存足够覆盖所有需求，无缺口</div>':
                `<div class="table-wrap"><table><tr><th>物料</th><th>净需求量</th><th>当前库存</th><th>缺口</th><th>单位</th><th>来源订单</th><th>操作</th></tr>
                ${rows.map(r=>`<tr>
                  <td>${r.name}</td>
                  <td>${r.demand}</td>
                  <td>${r.stock}</td>
                  <td><span class="tag ${r.gap>0?'tag-red':'tag-green'}">${r.gap>0?'+'+r.gap:'充足'}</span></td>
                  <td>${r.unit}</td>
                  <td style="font-size:10px;color:var(--text2);">${r.orders.join(', ')}</td>
                  <td>${r.gap>0?`<button class="btn btn-sm btn-primary" onclick="createPOFromMRP('${r.matId}','${r.name}',${r.gap})">创建采购单</button>`:''}</td>
                </tr>`).join('')}
                </table></div>`}
                </div>`;
            }
            window.createPOFromMRP = function(matId, matName, qty) {
                const db=getDBRef();
                const po={id:'po_'+(db.idCounter++),poNumber:'PO-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'-'+String(db.idCounter).padStart(3,'0'),materialId:matId,materialName:matName,quantity:qty,receivedQuantity:0,status:'pending',relatedOrderId:null,supplier:'',note:'由MRP自动生成',createdAt:new Date().toISOString()};

            };

                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                  <button class="btn btn-primary" onclick="exportData()">📤 导出数据 JSON</button>
                  <label class="btn btn-outline" style="cursor:pointer;">📥 导入数据 JSON<input type="file" accept=".json" style="display:none" onchange="importData(this)"></label>
                </div></div>

                <div class="card"><h3>🗑️ 数据管理</h3>
                <p style="font-size:12px;color:var(--text2);margin-bottom:10px;">清空所有业务数据（订单、库存、记录等），保留基础配置和用户</p>
                <button class="btn btn-danger" onclick="clearAllData()">⚠️ 清空业务数据</button></div>`;
            }
            window.saveSettings = function() {
                const db=getDBRef();
                const cn=document.getElementById('setCName')?.value.trim(), fn=document.getElementById('setFName')?.value.trim();
                if(!cn||!fn){showToast('⚠️ 名称不能为空'); return;}
                db.systemConfig.companyName=cn; db.systemConfig.factoryName=fn;
                saveAndRefresh(); showToast('✅ 设置已保存'); updateHeaderUI();
            };
            window.addMaterial = function() {
                const db=getDBRef();
                const name=document.getElementById('newMatName')?.value.trim(), sku=document.getElementById('newMatSku')?.value.trim(), unit=document.getElementById('newMatUnit')?.value.trim();
                if(!name||!sku||!unit){showToast('⚠️ 请填写完整'); return;}
                if(db.materials.find(m=>m.sku===sku)){showToast('⚠️ SKU已存在'); return;}
                db.materials.push({id:'mat_'+(db.idCounter++),name,sku,unit});
                saveAndRefresh(); showToast('✅ 物料已添加');
            };
            window.deleteMaterial = function(id) {
                const db=getDBRef();
                db.materials=db.materials.filter(m=>m.id!==id);
                db.boms=db.boms.filter(b=>b.materialId!==id);
                saveAndRefresh(); showToast('🗑️ 物料已删除');
            };
            window.addProduct = function() {
                const db=getDBRef();
                const name=document.getElementById('newProdName')?.value.trim(), sku=document.getElementById('newProdSku')?.value.trim();
                if(!name||!sku){showToast('⚠️ 请填写完整'); return;}
                if(db.products.find(p=>p.sku===sku)){showToast('⚠️ SKU已存在'); return;}
                db.products.push({id:'prod_'+(db.idCounter++),name,sku,unit:'个'});
                saveAndRefresh(); showToast('✅ 成品已添加');
            };
            window.deleteProduct = function(id) {
                const db=getDBRef();
                db.products=db.products.filter(p=>p.id!==id);
                db.boms=db.boms.filter(b=>b.productId!==id);
                saveAndRefresh(); showToast('🗑️ 成品已删除');
            };
            window.clearAllData = function() {
                if(!confirm('确定要清空所有业务数据吗？此操作不可撤销！')) return;
                const db=getDBRef();
                db.orders=[]; db.purchaseOrders=[]; db.productionOrders=[]; db.materialRecords=[]; db.productRecords=[];
                saveAndRefresh(); showToast('🗑️ 业务数据已清空');
            };

            // ==================== closeModal ====================
            window.closeModal = function() {
                document.getElementById('confirmModal').classList.remove('show');
            };

            // ==================== 销售订单页面 shipOrder ====================
            window.shipOrder = function(orderId) {
                switchPage('salesOutbound');
                // 稍等DOM渲染完后自动选中该订单
                setTimeout(()=>{
                    const sel=document.getElementById('salesOutOrder');
                    if(sel){sel.value=orderId; showToast('ℹ️ 已定位到对应订单，请填写出库数量');}
                }, 100);
            };

            window.exportData = function() {
                const db=getDBRef();
                const json=JSON.stringify(db,null,2);
                const blob=new Blob([json],{type:'application/json'});
                const a=document.createElement('a');
                a.href=URL.createObjectURL(blob);
                a.download='erp_backup_'+new Date().toISOString().slice(0,10)+'.json';
                a.click(); URL.revokeObjectURL(a.href);
                showToast('✅ 数据已导出');
            };
            window.importData = function(input) {
                const file=input.files[0]; if(!file) return;
                const reader=new FileReader();
                reader.onload=function(e){
                    try {
                        const db=JSON.parse(e.target.result);
                        if(!db.users||!db.orders||!db.materials){showToast('⚠️ 文件格式不正确'); return;}
                        saveDB(db); showToast('✅ 数据已恢复'); switchPage('dashboard');
                    }catch(err){showToast('⚠️ 解析失败：'+err.message);}
                };
                reader.readAsText(file);
                input.value='';
            };

            // 初始化
            initDB();
            checkAutoLogin();

            // 暴露函数
            window.switchPage = switchPage;
            window.doLogin = doLogin; window.doRegister = doRegister; window.doLogout = doLogout;
            window.submitMatIn = submitMatIn; window.submitProdIn = submitProdIn; window.submitSalesOut = submitSalesOut;
            window.createOrder = createOrder; window.createProdOrder = createProdOrder; window.traceOrder = traceOrder;
            window.startProd = startProd;
            window.submitMatTransfer = submitMatTransfer; window.submitProdTransfer = submitProdTransfer;
            window.createPOFromMRP = createPOFromMRP; window.createPurchaseOrder = createPurchaseOrder; window.cancelPO = cancelPO;
            window.addBOM = addBOM; window.deleteBOM = deleteBOM;
            window.saveSettings = saveSettings; window.addMaterial = addMaterial; window.deleteMaterial = deleteMaterial;
            window.addProduct = addProduct; window.deleteProduct = deleteProduct; window.clearAllData = clearAllData;
            window.exportData = exportData; window.importData = importData; window.checkPOMismatch = checkPOMismatch;
        })();
    </script>
</body>
</html>
